<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="iCHAT — دردشة فورية بتصميم عصري 2026">
  <meta name="theme-color" content="#07070d">
  <title>iCHAT — Messages</title>
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
</head>
<body>
  
  <div class="chat-app" id="chatApp">
    
    <!-- ====== SIDEBAR ====== -->
    <aside class="sidebar" id="sidebar">
      
      <!-- Sidebar Header -->
      <div class="sidebar__header">
        <div class="sidebar__logo">
          <div class="sidebar__logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <span class="sidebar__logo-text">iCHAT</span>
        </div>
        <div class="sidebar__actions">
          <button class="icon-btn" id="themeToggleBtn" title="Toggle Theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <button class="icon-btn" id="profileBtn" title="Profile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
          <button class="icon-btn" id="logoutBtn" title="Logout">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
      
      <!-- User Profile Mini -->
      <div class="sidebar__profile" id="sidebarProfile">
        <div class="avatar avatar--md" id="sidebarAvatar">
          <span id="sidebarAvatarLetter">U</span>
          <span class="status-dot status-dot--online"></span>
        </div>
        <div class="sidebar__profile-info">
          <div class="sidebar__profile-name" id="sidebarUserName">User</div>
          <div class="sidebar__profile-status">
            <span class="sidebar__profile-status-dot"></span>
            <span>Online</span>
          </div>
        </div>
      </div>
      
      <!-- Search -->
      <div class="sidebar__search">
        <div class="search-input">
          <span class="search-input__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </span>
          <input type="text" class="search-input__field" id="searchInput" placeholder="Search conversations...">
        </div>
      </div>
      
      <!-- Contacts List -->
      <div class="sidebar__contacts" id="contactsList">
        <!-- Contacts will be rendered by JS -->
      </div>
      
    </aside>
    
    <!-- ====== MAIN CHAT AREA ====== -->
    <main class="chat-main" id="chatMain">
      
      <!-- Empty State -->
      <div class="chat-empty" id="chatEmpty">
        <div class="chat-empty__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            <path d="M8 10h.01"/>
            <path d="M12 10h.01"/>
            <path d="M16 10h.01"/>
          </svg>
        </div>
        <h2 class="chat-empty__title">Welcome to iCHAT</h2>
        <p class="chat-empty__description">Select a conversation from the sidebar to start chatting. Your messages are private and secure.</p>
      </div>
      
      <!-- Active Chat (hidden by default) -->
      <div id="activeChat" style="display:none; flex-direction:column; height:100%;">
        
        <!-- Chat Header -->
        <header class="chat-header" id="chatHeader">
          <div class="chat-header__left">
            <button class="icon-btn chat-header__back" id="backBtn" title="Back">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
            </button>
            <div class="chat-header__avatar">
              <div class="avatar avatar--md" id="chatAvatar">
                <span id="chatAvatarLetter">?</span>
              </div>
              <span class="status-dot" id="chatStatusDot"></span>
            </div>
            <div class="chat-header__info">
              <h2 class="chat-header__name" id="chatContactName">Contact Name</h2>
              <div class="chat-header__status">
                <span class="chat-header__status-dot" id="chatStatusIndicator"></span>
                <span id="chatStatusText">Online</span>
              </div>
            </div>
          </div>
          <div class="chat-header__right">
            <button class="icon-btn" title="Voice Call">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
            </button>
            <button class="icon-btn" title="Video Call">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="23 7 16 12 23 17 23 7"/>
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
              </svg>
            </button>
            <button class="icon-btn" title="More Options">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="1"/>
                <circle cx="19" cy="12" r="1"/>
                <circle cx="5" cy="12" r="1"/>
              </svg>
            </button>
          </div>
        </header>
        
        <!-- Messages Area -->
        <div class="chat-messages" id="chatMessages">
          <!-- Messages will be rendered by JS -->
        </div>
        
        <!-- Typing Indicator -->
        <div class="typing-indicator" id="typingIndicator">
          <span class="typing-indicator__dot"></span>
          <span class="typing-indicator__dot"></span>
          <span class="typing-indicator__dot"></span>
        </div>
        
        <!-- Chat Input -->
        <div class="chat-input" id="chatInputArea">
          <div class="chat-input__wrapper">
            <div class="chat-input__field-wrap">
              <button class="chat-input__emoji-btn" id="emojiToggleBtn" title="Emoji">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"/>
                  <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                  <line x1="9" y1="9" x2="9.01" y2="9"/>
                  <line x1="15" y1="9" x2="15.01" y2="9"/>
                </svg>
              </button>
              <textarea 
                class="chat-input__field" 
                id="messageInput" 
                placeholder="Type a message..." 
                rows="1"
              ></textarea>
            </div>
            <button class="chat-input__send-btn chat-input__send-btn--disabled" id="sendBtn" title="Send">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
          
          <!-- Emoji Picker -->
          <div class="emoji-picker" id="emojiPicker">
            <div class="emoji-picker__header">
              <input type="text" class="emoji-picker__search" id="emojiSearch" placeholder="Search emoji...">
            </div>
            <div class="emoji-picker__categories" id="emojiCategories">
              <!-- Categories rendered by JS -->
            </div>
            <div class="emoji-picker__grid" id="emojiGrid">
              <!-- Emojis rendered by JS -->
            </div>
          </div>
          
        </div>
      </div>
      
    </main>
    
  </div>
  
  <!-- Profile Modal -->
  <div class="modal-overlay" id="profileModal">
    <div class="modal">
      <div class="modal__header">
        <h3 class="modal__title">Profile Settings</h3>
        <button class="icon-btn" id="closeProfileBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal__body">
        <div class="profile-avatar-section">
          <div class="avatar avatar--xl" id="profileAvatar">
            <span id="profileAvatarLetter">U</span>
          </div>
        </div>
        <div class="profile-form__group">
          <label class="profile-form__label" for="profileName">Display Name</label>
          <input type="text" class="profile-form__input" id="profileName" placeholder="Your name">
        </div>
        <div class="profile-form__group">
          <label class="profile-form__label" for="profileStatus">Status</label>
          <input type="text" class="profile-form__input" id="profileStatus" placeholder="What's on your mind?">
        </div>
        <div class="theme-toggle-section">
          <div class="theme-toggle-section__label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <span>Light Mode</span>
          </div>
          <div class="theme-switch" id="themeSwitch">
            <div class="theme-switch__knob"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>
  
  <!-- Notification Sound -->
  <audio id="notificationSound" preload="auto">
    <source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA" type="audio/wav">
  </audio>
  
  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/contacts.js"></script>
  <script src="js/emoji.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
