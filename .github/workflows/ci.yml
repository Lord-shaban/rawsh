name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: فحص الكود
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Static checks (JS bundle + CSS + required files)
        run: npm run check

  smoke:
    name: اختبار المتصفح
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install --no-audit --no-fund
          npm install --no-save playwright

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke test (renders + reaches Supabase + no console errors)
        run: node scripts/smoke.mjs
