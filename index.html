<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="iCHAT — تطبيق دردشة عصري بتصميم 2026 مستوحى من واتساب وتلجرام">
  <meta name="theme-color" content="#07070d">
  <title>iCHAT — Welcome</title>
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/responsive.css">
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
</head>
<body>
  
  <div class="login-page" id="loginPage">
    
    <!-- Animated Background -->
    <div class="login-bg">
      <div class="login-bg__orb login-bg__orb--1"></div>
      <div class="login-bg__orb login-bg__orb--2"></div>
      <div class="login-bg__orb login-bg__orb--3"></div>
    </div>
    
    <!-- Grid Pattern -->
    <div class="login-grid"></div>
    
    <!-- Floating Particles (generated via JS) -->
    <div class="login-particles" id="loginParticles"></div>
    
    <!-- Login Card -->
    <div class="login-card">
      
      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            <path d="M8 10h.01"/>
            <path d="M12 10h.01"/>
            <path d="M16 10h.01"/>
          </svg>
        </div>
        <h1 class="login-logo__title">iCHAT</h1>
        <p class="login-logo__subtitle">Connect instantly. Chat beautifully.</p>
      </div>
      
      <!-- Login Form -->
      <form class="login-form" id="loginForm">
        <div class="login-form__group">
          <label class="login-form__label" for="username">Username</label>
          <div class="login-form__input-wrap">
            <span class="login-form__input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input 
              type="text" 
              class="login-form__input" 
              id="usernameInput"
              placeholder="Enter your username"
              autocomplete="off"
              required
              minlength="2"
              maxlength="20"
            >
          </div>
          <p class="login-form__error" id="usernameError">Please enter a valid username (2-20 characters)</p>
        </div>
        
        <button type="submit" class="login-form__submit" id="loginBtn">
          <span class="login-form__submit-text">Start Chatting</span>
          <div class="login-form__submit-spinner"></div>
        </button>
      </form>
      
      <!-- Features -->
      <div class="login-features">
        <div class="login-features__item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <span>End-to-End Encrypted</span>
        </div>
        <div class="login-features__item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span>Real-time Messaging</span>
        </div>
        <div class="login-features__item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
          </svg>
          <span>Customizable</span>
        </div>
      </div>
      
    </div>
  </div>
  
  <!-- Scripts -->
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
